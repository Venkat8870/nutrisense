<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriSense — Smart Food & Nutrition Tracker</title>
  <meta name="description"
    content="NutriSense is a smart food and healthy eating tracker with AI-powered meal analysis, weekly habit reports, and personalized nutrition goals." />

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
              300: '#86efac', 400: '#4ade80', 500: '#22c55e',
              600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
            },
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { transform: 'translateY(16px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
          },
        },
      },
    };
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0a0f1e;
      font-family: 'Inter', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1a2035;
    }

    ::-webkit-scrollbar-thumb {
      background: #2d3f5a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3d5470;
    }

    .ring-svg circle {
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-hover:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .tab-active {
      background: linear-gradient(135deg, #22c55e22, #16a34a11);
      border-color: #22c55e55 !important;
      color: #4ade80 !important;
    }

    .glow-green {
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }

    .skeleton {
      background: linear-gradient(90deg, #1a2035 25%, #243050 50%, #1a2035 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .bar-chart-container {
      position: relative;
      height: 220px;
    }

    input[type="range"] {
      accent-color: #22c55e;
    }

    .ring-track {
      stroke: rgba(255, 255, 255, 0.06);
    }

    .meal-card {
      animation: slideUp 0.3s ease-out;
    }

    .search-result-item:hover {
      background: rgba(34, 197, 94, 0.1);
    }

    .nav-tab {
      transition: all 0.2s ease;
    }

    .ai-card {
      border: 1px solid rgba(147, 51, 234, 0.3);
      background: linear-gradient(135deg, rgba(147, 51, 234, 0.08), rgba(79, 70, 229, 0.08));
    }

    .score-ring {
      transition: stroke-dashoffset 1s ease;
    }
  </style>
</head>

<body class="dark min-h-screen text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useContext, createContext, useCallback } = React;

    /* ============================================================
       CONSTANTS & DEFAULTS
    ============================================================ */
    const DEFAULT_GOALS = { calories: 2000, protein: 150, carbs: 250, fat: 65, dietType: 'Balanced' };
    const DIET_PRESETS = {
      Balanced: { protein: 25, carbs: 50, fat: 25 },
      Keto: { protein: 30, carbs: 5, fat: 65 },
      Vegan: { protein: 15, carbs: 65, fat: 20 },
      Mediterranean: { protein: 20, carbs: 50, fat: 30 },
    };
    const MEAL_TYPES = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];
    const GEMINI_API_KEY = 'AIzaSyASymD1V1wx3BgCKLO8YJNHaeIxShTuP3Y'; // Replace with actual key

    /* ============================================================
       LOCAL STORAGE HELPERS
    ============================================================ */
    const storage = {
      get: (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
      set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch { } },
    };

    const todayKey = () => new Date().toISOString().split('T')[0];
    const dayKey = (offset) => { const d = new Date(); d.setDate(d.getDate() - offset); return d.toISOString().split('T')[0]; };

    /* ============================================================
       APP CONTEXT
    ============================================================ */
    const AppContext = createContext(null);

    function AppProvider({ children }) {
      const [goals, setGoals] = useState(() => storage.get('nutrisense_goals', DEFAULT_GOALS));
      const [logs, setLogs] = useState(() => storage.get('nutrisense_logs', {}));
      const [activeTab, setActiveTab] = useState('dashboard');

      useEffect(() => { storage.set('nutrisense_goals', goals); }, [goals]);
      useEffect(() => { storage.set('nutrisense_logs', logs); }, [logs]);

      const todayMeals = logs[todayKey()] || [];

      const addMeal = (meal) => {
        const key = todayKey();
        setLogs(prev => ({ ...prev, [key]: [...(prev[key] || []), { ...meal, id: Date.now() }] }));
      };

      const deleteMeal = (id) => {
        const key = todayKey();
        setLogs(prev => ({ ...prev, [key]: (prev[key] || []).filter(m => m.id !== id) }));
      };

      const todayTotals = todayMeals.reduce((acc, m) => ({
        calories: acc.calories + (m.calories || 0),
        protein: acc.protein + (m.protein || 0),
        carbs: acc.carbs + (m.carbs || 0),
        fat: acc.fat + (m.fat || 0),
      }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

      return (
        <AppContext.Provider value={{ goals, setGoals, logs, addMeal, deleteMeal, todayMeals, todayTotals, activeTab, setActiveTab }}>
          {children}
        </AppContext.Provider>
      );
    }

    /* ============================================================
       GEMINI API HELPER
    ============================================================ */
    async function callGemini(prompt) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      });
      if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    /* ============================================================
       OPEN FOOD FACTS API
    ============================================================ */
    async function searchFoods(query) {
      const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,serving_size,brands`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.products || []).filter(p => p.product_name && p.nutriments).map(p => ({
        name: p.product_name,
        brand: p.brands || '',
        serving: p.serving_size || '100g',
        calories: Math.round(p.nutriments?.['energy-kcal_serving'] || p.nutriments?.['energy-kcal_100g'] || 0),
        protein: Math.round((p.nutriments?.['proteins_serving'] || p.nutriments?.['proteins_100g'] || 0) * 10) / 10,
        carbs: Math.round((p.nutriments?.['carbohydrates_serving'] || p.nutriments?.['carbohydrates_100g'] || 0) * 10) / 10,
        fat: Math.round((p.nutriments?.['fat_serving'] || p.nutriments?.['fat_100g'] || 0) * 10) / 10,
      }));
    }

    /* ============================================================
       CIRCULAR PROGRESS RING
    ============================================================ */
    function CircleRing({ value, max, label, unit, color, size = 110 }) {
      const radius = 42;
      const circ = 2 * Math.PI * radius;
      const pct = Math.min(value / Math.max(max, 1), 1);
      const offset = circ * (1 - pct);
      const ratio = value / Math.max(max, 1);
      const ringColor = ratio > 1 ? '#ef4444' : ratio > 0.85 ? '#f59e0b' : color;
      const displayVal = value >= 1000 ? (value / 1000).toFixed(1) + 'k' : Math.round(value);

      return (
        <div className="flex flex-col items-center gap-1">
          <svg width={size} height={size} viewBox="0 0 100 100" className="ring-svg -rotate-90">
            <circle className="ring-track" cx="50" cy="50" r={radius} strokeWidth="8" fill="none" />
            <circle
              cx="50" cy="50" r={radius}
              strokeWidth="8" fill="none"
              stroke={ringColor}
              strokeDasharray={circ}
              strokeDashoffset={offset}
              strokeLinecap="round"
              style={{ filter: ratio > 0 ? `drop-shadow(0 0 6px ${ringColor}80)` : 'none' }}
            />
          </svg>
          <div className="text-center -mt-1">
            <div className="text-lg font-bold" style={{ color: ringColor }}>{displayVal}<span className="text-xs font-normal opacity-60">{unit}</span></div>
            <div className="text-xs text-slate-400 font-medium">{label}</div>
            <div className="text-xs text-slate-500">{Math.round(value)}/{max}</div>
          </div>
        </div>
      );
    }

    /* ============================================================
       SKELETON LOADER
    ============================================================ */
    function Skeleton({ className = '' }) {
      return <div className={`skeleton rounded-lg ${className}`} />;
    }

    /* ============================================================
       AI INSIGHT CARD
    ============================================================ */
    function AIInsightCard({ meal, onClose }) {
      const [loading, setLoading] = useState(true);
      const [insight, setInsight] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        const prompt = `You are a nutrition expert AI. Analyze this meal and respond ONLY with valid JSON (no markdown, no code fences):

Meal: "${meal.name}"
Calories: ${meal.calories} kcal | Protein: ${meal.protein}g | Carbs: ${meal.carbs}g | Fat: ${meal.fat}g

JSON format:
{"score": <1-10 integer>, "tip": "<one actionable tip under 20 words>", "warning": "<one short health warning under 20 words>"}`;

        callGemini(prompt)
          .then(text => {
            const json = JSON.parse(text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim());
            setInsight(json);
          })
          .catch(() => {
            setInsight({ score: 7, tip: 'Consider pairing with vegetables for a balanced meal.', warning: 'Monitor portion size to stay within daily calorie goals.' });
          })
          .finally(() => setLoading(false));
      }, []);

      const scoreColor = insight?.score >= 7 ? '#22c55e' : insight?.score >= 4 ? '#f59e0b' : '#ef4444';

      return (
        <div className="ai-card rounded-2xl p-4 mt-3 animate-fade-in relative">
          <button onClick={onClose} className="absolute top-3 right-3 text-slate-400 hover:text-white text-lg leading-none">×</button>
          <div className="flex items-center gap-2 mb-3">
            <span className="text-lg">✨</span>
            <span className="text-sm font-semibold text-purple-300">AI Meal Analysis</span>
            <span className="ml-auto text-xs text-slate-500">Gemini Flash</span>
          </div>
          {loading ? (
            <div className="space-y-2">
              <Skeleton className="h-4 w-3/4" />
              <Skeleton className="h-4 w-1/2" />
              <Skeleton className="h-4 w-2/3" />
            </div>
          ) : (
            <div className="space-y-2 animate-fade-in">
              <div className="flex items-center gap-3">
                <div className="w-14 h-14 rounded-full flex items-center justify-center border-2 shrink-0" style={{ borderColor: scoreColor, color: scoreColor }}>
                  <div className="text-center"><div className="text-xl font-bold leading-none">{insight.score}</div><div className="text-xs opacity-70">/10</div></div>
                </div>
                <div className="space-y-1">
                  <div className="flex items-start gap-1 text-sm text-green-300"><span>💡</span><span>{insight.tip}</span></div>
                  <div className="flex items-start gap-1 text-sm text-amber-300"><span>⚠️</span><span>{insight.warning}</span></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       TAB 1: MEAL LOGGER
    ============================================================ */
    function MealLogger() {
      const { addMeal } = useContext(AppContext);
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [selected, setSelected] = useState(null);
      const [mealType, setMealType] = useState('Breakfast');
      const [showAI, setShowAI] = useState(false);
      const [lastAdded, setLastAdded] = useState(null);
      const debounceRef = useRef(null);

      const handleSearch = (val) => {
        setQuery(val);
        setSelected(null);
        if (!val.trim()) { setResults([]); return; }
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(async () => {
          setSearching(true);
          try { setResults(await searchFoods(val)); }
          catch { setResults([]); }
          finally { setSearching(false); }
        }, 500);
      };

      const handleAdd = () => {
        if (!selected) return;
        const meal = { ...selected, mealType, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
        addMeal(meal);
        setLastAdded(meal);
        setShowAI(true);
        setSelected(null);
        setQuery('');
        setResults([]);
      };

      return (
        <div className="space-y-4 animate-fade-in">
          <div className="glass rounded-2xl p-5">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <span className="w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center text-green-400">🍽</span>
              Log a Meal
            </h2>

            {/* Meal Type Selector */}
            <div className="flex gap-2 mb-4 flex-wrap">
              {MEAL_TYPES.map(t => (
                <button key={t} onClick={() => setMealType(t)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-medium border transition-all ${mealType === t ? 'tab-active' : 'border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                  {t === 'Breakfast' ? '🌅' : t === 'Lunch' ? '☀️' : t === 'Dinner' ? '🌙' : '🍎'} {t}
                </button>
              ))}
            </div>

            {/* Search Input */}
            <div className="relative mb-3">
              <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</div>
              <input
                type="text" value={query} onChange={e => handleSearch(e.target.value)}
                placeholder="Search food (e.g. banana, chicken breast…)"
                className="w-full pl-9 pr-4 py-3 bg-slate-800/60 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-green-500/60 focus:ring-1 focus:ring-green-500/30 transition-all"
              />
              {searching && <div className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 border-2 border-green-400 border-t-transparent rounded-full animate-spin" />}
            </div>

            {/* Search Results */}
            {results.length > 0 && !selected && (
              <div className="bg-slate-900/80 border border-slate-700 rounded-xl overflow-hidden mb-3 max-h-64 overflow-y-auto">
                {results.map((r, i) => (
                  <button key={i} onClick={() => { setSelected(r); setQuery(r.name); setResults([]); }}
                    className="search-result-item w-full text-left px-4 py-3 border-b border-slate-800/60 last:border-0 transition-all group">
                    <div className="flex justify-between items-start">
                      <div>
                        <div className="text-sm font-medium text-white group-hover:text-green-300 transition-colors line-clamp-1">{r.name}</div>
                        {r.brand && <div className="text-xs text-slate-500">{r.brand} · {r.serving}</div>}
                      </div>
                      <div className="text-right shrink-0 ml-3">
                        <div className="text-sm font-bold text-green-400">{r.calories} kcal</div>
                        <div className="text-xs text-slate-500">P:{r.protein}g C:{r.carbs}g F:{r.fat}g</div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            )}

            {/* Selected Food Card */}
            {selected && (
              <div className="bg-green-500/10 border border-green-500/30 rounded-xl p-4 mb-3 animate-slide-up">
                <div className="flex justify-between items-start mb-3">
                  <div>
                    <div className="font-semibold text-white">{selected.name}</div>
                    <div className="text-xs text-slate-400">{selected.brand} · Per {selected.serving}</div>
                  </div>
                  <button onClick={() => { setSelected(null); setQuery(''); }} className="text-slate-500 hover:text-red-400 text-lg leading-none">×</button>
                </div>
                <div className="grid grid-cols-4 gap-2">
                  {[
                    { label: 'Calories', val: selected.calories, unit: 'kcal', color: 'text-yellow-400' },
                    { label: 'Protein', val: selected.protein, unit: 'g', color: 'text-blue-400' },
                    { label: 'Carbs', val: selected.carbs, unit: 'g', color: 'text-orange-400' },
                    { label: 'Fat', val: selected.fat, unit: 'g', color: 'text-purple-400' },
                  ].map(m => (
                    <div key={m.label} className="bg-slate-800/60 rounded-lg p-2 text-center">
                      <div className={`text-base font-bold ${m.color}`}>{m.val}<span className="text-xs">{m.unit}</span></div>
                      <div className="text-xs text-slate-500">{m.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <button onClick={handleAdd} disabled={!selected}
              className="w-full py-3 rounded-xl font-semibold text-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white shadow-lg glow-green disabled:shadow-none">
              ＋ Add to Today's Log
            </button>
          </div>

          {/* AI Insight */}
          {showAI && lastAdded && (
            <AIInsightCard meal={lastAdded} onClose={() => setShowAI(false)} />
          )}
        </div>
      );
    }

    /* ============================================================
       TAB 2: DAILY DASHBOARD
    ============================================================ */
    function Dashboard() {
      const { goals, todayMeals, todayTotals, deleteMeal } = useContext(AppContext);
      const remaining = {
        calories: goals.calories - todayTotals.calories,
        protein: goals.protein - todayTotals.protein,
        carbs: goals.carbs - todayTotals.carbs,
        fat: goals.fat - todayTotals.fat,
      };

      return (
        <div className="space-y-4 animate-fade-in">
          {/* Nutrition Rings */}
          <div className="glass rounded-2xl p-5">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <span className="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">📊</span>
              Today's Progress
            </h2>
            <div className="grid grid-cols-4 gap-2 justify-items-center">
              <CircleRing value={todayTotals.calories} max={goals.calories} label="Calories" unit="kcal" color="#f59e0b" />
              <CircleRing value={todayTotals.protein} max={goals.protein} label="Protein" unit="g" color="#3b82f6" />
              <CircleRing value={todayTotals.carbs} max={goals.carbs} label="Carbs" unit="g" color="#f97316" />
              <CircleRing value={todayTotals.fat} max={goals.fat} label="Fat" unit="g" color="#a855f7" />
            </div>

            {/* Remaining Summary */}
            <div className="mt-4 grid grid-cols-4 gap-2 text-center">
              {Object.entries(remaining).map(([k, v]) => (
                <div key={k} className="bg-slate-800/50 rounded-lg p-2">
                  <div className={`text-sm font-bold ${v < 0 ? 'text-red-400' : 'text-slate-300'}`}>{v < 0 ? '-' : ''}{Math.abs(Math.round(v))}</div>
                  <div className="text-xs text-slate-500">{k === 'calories' ? 'kcal left' : `${k[0].toUpperCase() + k.slice(1)} left`}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Today's Meals */}
          <div className="glass rounded-2xl p-5">
            <h2 className="text-lg font-bold mb-3 flex items-center gap-2">
              <span className="w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center">🗒</span>
              Today's Meals
              <span className="ml-auto text-sm font-normal text-slate-500">{todayMeals.length} entries</span>
            </h2>
            {todayMeals.length === 0 ? (
              <div className="text-center py-10 text-slate-500">
                <div className="text-4xl mb-2">🍽</div>
                <div className="text-sm">No meals logged yet. Start by searching for food!</div>
              </div>
            ) : (
              <div className="space-y-2">
                {todayMeals.map(m => (
                  <div key={m.id} className="meal-card flex items-center justify-between bg-slate-800/40 hover:bg-slate-800/70 rounded-xl px-4 py-3 transition-all group border border-transparent hover:border-slate-700">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="text-xs px-2 py-0.5 rounded-full bg-green-500/15 text-green-400 font-medium shrink-0">{m.mealType}</span>
                        <span className="text-sm font-medium text-white truncate">{m.name}</span>
                      </div>
                      <div className="mt-1 text-xs text-slate-500 flex gap-2 flex-wrap">
                        <span className="text-yellow-400">{m.calories} kcal</span>
                        <span>P:{m.protein}g</span>
                        <span>C:{m.carbs}g</span>
                        <span>F:{m.fat}g</span>
                        <span className="ml-auto">{m.time}</span>
                      </div>
                    </div>
                    <button onClick={() => deleteMeal(m.id)}
                      className="ml-3 opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all text-xl leading-none shrink-0">
                      🗑
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       TAB 3: AI MEAL ANALYSIS (standalone tab)
    ============================================================ */
    function AIAnalysis() {
      const { todayMeals, todayTotals, goals } = useContext(AppContext);
      const [loading, setLoading] = useState(false);
      const [report, setReport] = useState(null);
      const [error, setError] = useState(null);

      const analyze = async () => {
        if (todayMeals.length === 0) return;
        setLoading(true); setReport(null); setError(null);
        const mealList = todayMeals.map(m => `${m.mealType}: ${m.name} (${m.calories}kcal P:${m.protein}g C:${m.carbs}g F:${m.fat}g)`).join('\n');
        const prompt = `You are a nutrition expert. Analyze today's meal log and respond ONLY with valid JSON (no markdown, no code fences):

Today's meals:
${mealList}

Total: ${Math.round(todayTotals.calories)} kcal | Protein: ${Math.round(todayTotals.protein)}g | Carbs: ${Math.round(todayTotals.carbs)}g | Fat: ${Math.round(todayTotals.fat)}g
Goal: ${goals.calories} kcal | P:${goals.protein}g | C:${goals.carbs}g | F:${goals.fat}g

JSON format:
{"overallScore": <1-10>, "summary": "<2-3 sentence overall assessment>", "positives": ["<positive 1>", "<positive 2>"], "improvements": ["<improvement 1>", "<improvement 2>"], "recommendation": "<single actionable next step under 25 words>"}`;

        try {
          const text = await callGemini(prompt);
          const json = JSON.parse(text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim());
          setReport(json);
        } catch {
          setError('Could not generate AI analysis. Please check your Gemini API key.');
        } finally {
          setLoading(false);
        }
      };

      const scoreColor = report?.overallScore >= 7 ? '#22c55e' : report?.overallScore >= 4 ? '#f59e0b' : '#ef4444';

      return (
        <div className="space-y-4 animate-fade-in">
          <div className="ai-card rounded-2xl p-5">
            <div className="flex items-center gap-3 mb-4">
              <div className="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center text-xl">✨</div>
              <div>
                <h2 className="text-lg font-bold">AI Meal Analysis</h2>
                <p className="text-xs text-slate-500">Powered by Gemini Flash</p>
              </div>
            </div>

            {todayMeals.length === 0 ? (
              <div className="text-center py-8 text-slate-500">
                <div className="text-4xl mb-2">🤖</div>
                <div className="text-sm">Log some meals first to get AI insights!</div>
              </div>
            ) : (
              <>
                <div className="bg-slate-800/40 rounded-xl p-3 mb-4 text-sm text-slate-400">
                  <span className="text-white font-medium">{todayMeals.length} meals</span> logged today — {Math.round(todayTotals.calories)} kcal total
                </div>
                <button onClick={analyze} disabled={loading}
                  className="w-full py-3 rounded-xl font-semibold text-sm bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white transition-all disabled:opacity-60 disabled:cursor-not-allowed mb-4">
                  {loading ? '🔄 Analyzing…' : '✨ Analyze Today\'s Meals'}
                </button>
              </>
            )}

            {loading && (
              <div className="space-y-3 animate-fade-in">
                <Skeleton className="h-20 w-full" />
                <Skeleton className="h-4 w-3/4" />
                <Skeleton className="h-4 w-1/2" />
              </div>
            )}

            {error && <div className="text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-xl p-3">{error}</div>}

            {report && !loading && (
              <div className="space-y-4 animate-slide-up">
                {/* Score */}
                <div className="flex items-center gap-4 bg-slate-800/50 rounded-xl p-4">
                  <div className="w-16 h-16 rounded-full flex items-center justify-center border-2 shrink-0 text-2xl font-bold" style={{ borderColor: scoreColor, color: scoreColor }}>
                    {report.overallScore}
                  </div>
                  <div>
                    <div className="font-semibold text-white mb-1">Overall Health Score</div>
                    <div className="text-sm text-slate-400">{report.summary}</div>
                  </div>
                </div>

                {/* Positives */}
                <div className="bg-green-500/10 border border-green-500/20 rounded-xl p-4">
                  <div className="text-sm font-semibold text-green-400 mb-2">✅ What's Working</div>
                  {report.positives?.map((p, i) => <div key={i} className="text-sm text-slate-300 flex gap-2 mb-1"><span className="text-green-500">•</span>{p}</div>)}
                </div>

                {/* Improvements */}
                <div className="bg-amber-500/10 border border-amber-500/20 rounded-xl p-4">
                  <div className="text-sm font-semibold text-amber-400 mb-2">💡 Room for Improvement</div>
                  {report.improvements?.map((p, i) => <div key={i} className="text-sm text-slate-300 flex gap-2 mb-1"><span className="text-amber-500">•</span>{p}</div>)}
                </div>

                {/* Recommendation */}
                <div className="bg-blue-500/10 border border-blue-500/20 rounded-xl p-4">
                  <div className="text-sm font-semibold text-blue-400 mb-1">🎯 Next Step</div>
                  <div className="text-sm text-slate-300">{report.recommendation}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       TAB 4: GOAL SETTING
    ============================================================ */
    function GoalSetting() {
      const { goals, setGoals } = useContext(AppContext);
      const [local, setLocal] = useState({ ...goals });
      const [saved, setSaved] = useState(false);

      const applyDiet = (diet) => {
        const p = DIET_PRESETS[diet];
        const totalCals = local.calories;
        setLocal(prev => ({
          ...prev, dietType: diet,
          protein: Math.round(totalCals * p.protein / 100 / 4),
          carbs: Math.round(totalCals * p.carbs / 100 / 4),
          fat: Math.round(totalCals * p.fat / 100 / 9),
        }));
      };

      const handleSave = () => {
        setGoals(local);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const macroTotal = () => {
        const proteinCal = local.protein * 4;
        const carbsCal = local.carbs * 4;
        const fatCal = local.fat * 9;
        const total = proteinCal + carbsCal + fatCal || 1;
        return {
          protein: Math.round(proteinCal / total * 100),
          carbs: Math.round(carbsCal / total * 100),
          fat: Math.round(fatCal / total * 100),
        };
      };

      const split = macroTotal();

      return (
        <div className="space-y-4 animate-fade-in">
          <div className="glass rounded-2xl p-5">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <span className="w-8 h-8 rounded-lg bg-amber-500/20 flex items-center justify-center">🎯</span>
              Nutrition Goals
            </h2>

            {/* Diet Presets */}
            <div className="mb-5">
              <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Diet Type</label>
              <div className="grid grid-cols-4 gap-2">
                {Object.keys(DIET_PRESETS).map(d => (
                  <button key={d} onClick={() => applyDiet(d)}
                    className={`py-2 px-2 rounded-xl text-xs font-semibold border transition-all ${local.dietType === d ? 'tab-active' : 'border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                    {d === 'Balanced' ? '⚖️' : d === 'Keto' ? '🥑' : d === 'Vegan' ? '🌱' : '🫒'} {d}
                  </button>
                ))}
              </div>
            </div>

            {/* Calorie Target */}
            <div className="mb-5">
              <div className="flex justify-between mb-2">
                <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Daily Calories</label>
                <span className="text-yellow-400 font-bold">{local.calories} kcal</span>
              </div>
              <input type="range" min="1200" max="4000" step="50" value={local.calories}
                onChange={e => setLocal(p => ({ ...p, calories: +e.target.value }))}
                className="w-full h-2 rounded-full appearance-none bg-slate-700" />
              <div className="flex justify-between text-xs text-slate-600 mt-1"><span>1200</span><span>4000</span></div>
            </div>

            {/* Macro Sliders */}
            {[
              { key: 'protein', label: 'Protein', unit: 'g', color: 'text-blue-400', max: 300 },
              { key: 'carbs', label: 'Carbs', unit: 'g', color: 'text-orange-400', max: 500 },
              { key: 'fat', label: 'Fat', unit: 'g', color: 'text-purple-400', max: 200 },
            ].map(({ key, label, unit, color, max }) => (
              <div key={key} className="mb-4">
                <div className="flex justify-between mb-2">
                  <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</label>
                  <span className={`font-bold ${color}`}>{local[key]}{unit}</span>
                </div>
                <input type="range" min="0" max={max} step="1" value={local[key]}
                  onChange={e => setLocal(p => ({ ...p, [key]: +e.target.value }))}
                  className="w-full h-2 rounded-full appearance-none bg-slate-700" />
              </div>
            ))}

            {/* Macro Split Visual */}
            <div className="bg-slate-800/50 rounded-xl p-3 mb-4">
              <div className="text-xs text-slate-400 mb-2 font-semibold">Macro Split</div>
              <div className="flex rounded-full overflow-hidden h-4 mb-2">
                <div className="bg-blue-500 transition-all" style={{ width: `${split.protein}%` }} />
                <div className="bg-orange-500 transition-all" style={{ width: `${split.carbs}%` }} />
                <div className="bg-purple-500 transition-all" style={{ width: `${split.fat}%` }} />
              </div>
              <div className="flex gap-4 text-xs">
                <span className="text-blue-400">P: {split.protein}%</span>
                <span className="text-orange-400">C: {split.carbs}%</span>
                <span className="text-purple-400">F: {split.fat}%</span>
              </div>
            </div>

            <button onClick={handleSave}
              className={`w-full py-3 rounded-xl font-semibold text-sm transition-all ${saved ? 'bg-green-600 text-white' : 'bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white shadow-lg'}`}>
              {saved ? '✅ Goals Saved!' : '💾 Save Goals'}
            </button>
          </div>
        </div>
      );
    }

    /* ============================================================
       TAB 5: WEEKLY HABIT REPORT
    ============================================================ */
    function WeeklyReport() {
      const { logs, goals } = useContext(AppContext);
      const chartRef = useRef(null);
      const chartInst = useRef(null);
      const [weeklyTip, setWeeklyTip] = useState('');
      const [loadingTip, setLoadingTip] = useState(false);

      // Build 7-day data
      const weekData = Array.from({ length: 7 }, (_, i) => {
        const key = dayKey(6 - i);
        const meals = logs[key] || [];
        const label = i === 6 ? 'Today' : new Date(key).toLocaleDateString('en', { weekday: 'short' });
        const cals = meals.reduce((s, m) => s + (m.calories || 0), 0);
        return { label, cals, meals, key };
      });

      const streak = (() => {
        let s = 0;
        for (let i = 6; i >= 0; i--) {
          if (weekData[i].cals >= goals.calories * 0.8 && weekData[i].cals <= goals.calories * 1.15) s++;
          else break;
        }
        return s;
      })();

      // Top 3 foods
      const foodCount = {};
      weekData.forEach(d => d.meals.forEach(m => { foodCount[m.name] = (foodCount[m.name] || 0) + 1; }));
      const top3 = Object.entries(foodCount).sort((a, b) => b[1] - a[1]).slice(0, 3);

      // Chart.js bar chart
      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInst.current) chartInst.current.destroy();
        chartInst.current = new Chart(chartRef.current, {
          type: 'bar',
          data: {
            labels: weekData.map(d => d.label),
            datasets: [{
              label: 'Calories',
              data: weekData.map(d => d.cals),
              backgroundColor: weekData.map(d =>
                d.cals === 0 ? 'rgba(100,116,139,0.3)' :
                  d.cals > goals.calories * 1.15 ? 'rgba(239,68,68,0.7)' :
                    d.cals >= goals.calories * 0.8 ? 'rgba(34,197,94,0.7)' :
                      'rgba(245,158,11,0.7)'
              ),
              borderColor: weekData.map(d =>
                d.cals === 0 ? '#475569' :
                  d.cals > goals.calories * 1.15 ? '#ef4444' :
                    d.cals >= goals.calories * 0.8 ? '#22c55e' :
                      '#f59e0b'
              ),
              borderWidth: 2,
              borderRadius: 8,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} kcal` } },
            },
            scales: {
              x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#94a3b8', font: { size: 11 } } },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#94a3b8', font: { size: 11 } },
                beginAtZero: true,
              },
            },
          },
        });
        return () => { if (chartInst.current) chartInst.current.destroy(); };
      }, [logs, goals]);

      const getWeeklyTip = async () => {
        setLoadingTip(true);
        const summary = weekData.map(d => `${d.label}: ${Math.round(d.cals)} kcal`).join(', ');
        const prompt = `You are a nutrition coach. Based on this week's calorie log: ${summary} (goal: ${goals.calories} kcal/day), give ONE concise motivational nutrition tip in 2 sentences max. No lists, no JSON, plain text only.`;
        try {
          const text = await callGemini(prompt);
          setWeeklyTip(text.trim());
        } catch {
          setWeeklyTip('Keep tracking your nutrition consistently — even small improvements compound over time. Focus on whole foods and stay hydrated!');
        } finally {
          setLoadingTip(false);
        }
      };

      const goalsHit = weekData.filter(d => d.cals >= goals.calories * 0.8 && d.cals <= goals.calories * 1.15).length;

      return (
        <div className="space-y-4 animate-fade-in">
          {/* Bar Chart */}
          <div className="glass rounded-2xl p-5">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
              <span className="w-8 h-8 rounded-lg bg-cyan-500/20 flex items-center justify-center">📈</span>
              7-Day Calorie Overview
            </h2>
            <div className="bar-chart-container">
              <canvas ref={chartRef} />
            </div>
            {/* Legend */}
            <div className="flex gap-4 mt-3 text-xs flex-wrap">
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-500 inline-block" /> On Track</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-amber-500 inline-block" /> Under</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-500 inline-block" /> Over</span>
            </div>
          </div>

          {/* Stats Row */}
          <div className="grid grid-cols-3 gap-3">
            <div className="glass rounded-2xl p-4 text-center">
              <div className="text-3xl font-bold text-green-400">{streak}</div>
              <div className="text-xs text-slate-400 mt-1">🔥 Day Streak</div>
            </div>
            <div className="glass rounded-2xl p-4 text-center">
              <div className="text-3xl font-bold text-blue-400">{goalsHit}</div>
              <div className="text-xs text-slate-400 mt-1">✅ Goals Hit</div>
            </div>
            <div className="glass rounded-2xl p-4 text-center">
              <div className="text-3xl font-bold text-purple-400">{weekData.reduce((s, d) => s + d.meals.length, 0)}</div>
              <div className="text-xs text-slate-400 mt-1">🍽 Total Meals</div>
            </div>
          </div>

          {/* Top 3 Foods */}
          {top3.length > 0 && (
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-bold text-slate-300 mb-3 flex items-center gap-2">
                <span>🏆</span> Top Foods This Week
              </h3>
              <div className="space-y-2">
                {top3.map(([name, count], i) => (
                  <div key={name} className="flex items-center gap-3 bg-slate-800/40 rounded-xl px-4 py-2.5">
                    <span className="text-lg">{['🥇', '🥈', '🥉'][i]}</span>
                    <span className="text-sm text-white flex-1 truncate">{name}</span>
                    <span className="text-xs text-slate-400 shrink-0">{count}× this week</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* AI Weekly Tip */}
          <div className="ai-card rounded-2xl p-5">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-lg">✨</span>
              <span className="text-sm font-semibold text-purple-300">AI Weekly Insight</span>
            </div>
            {loadingTip ? (
              <div className="space-y-2"><Skeleton className="h-4 w-full" /><Skeleton className="h-4 w-3/4" /></div>
            ) : weeklyTip ? (
              <p className="text-sm text-slate-300 leading-relaxed animate-fade-in">{weeklyTip}</p>
            ) : (
              <div className="text-center">
                <button onClick={getWeeklyTip}
                  className="px-4 py-2 rounded-xl text-sm font-semibold bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white transition-all">
                  ✨ Get AI Weekly Tip
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       NAVIGATION TABS
    ============================================================ */
    const TABS = [
      { id: 'logger', label: 'Log Meal', icon: '🍽' },
      { id: 'dashboard', label: 'Dashboard', icon: '📊' },
      { id: 'ai', label: 'AI Analysis', icon: '✨' },
      { id: 'goals', label: 'Goals', icon: '🎯' },
      { id: 'weekly', label: 'Weekly', icon: '📈' },
    ];

    function Navigation() {
      const { activeTab, setActiveTab } = useContext(AppContext);
      return (
        <nav className="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-xl border-t border-slate-800/60">
          <div className="max-w-lg mx-auto px-2 py-2 flex gap-1">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`nav-tab flex-1 flex flex-col items-center gap-0.5 px-1 py-2 rounded-xl text-xs font-medium border ${activeTab === t.id ? 'tab-active' : 'border-transparent text-slate-500 hover:text-slate-300'}`}>
                <span className="text-base leading-tight">{t.icon}</span>
                <span className="leading-tight">{t.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    /* ============================================================
       HEADER
    ============================================================ */
    function Header() {
      const { todayTotals, goals } = useContext(AppContext);
      const pct = Math.min(Math.round(todayTotals.calories / goals.calories * 100), 100);
      return (
        <header className="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-xl border-b border-slate-800/60">
          <div className="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center text-white font-bold text-sm shadow-lg glow-green">N</div>
              <div>
                <div className="font-bold text-sm text-white leading-none">NutriSense</div>
                <div className="text-xs text-slate-500 leading-none">Smart Nutrition Tracker</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-500">{new Date().toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
              <div className="text-xs font-semibold text-green-400">{Math.round(todayTotals.calories)} / {goals.calories} kcal</div>
              <div className="w-20 h-1 bg-slate-700 rounded-full mt-1 overflow-hidden">
                <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: pct > 115 ? '#ef4444' : pct > 85 ? '#22c55e' : '#f59e0b' }} />
              </div>
            </div>
          </div>
        </header>
      );
    }

    /* ============================================================
       MAIN APP
    ============================================================ */
    function App() {
      return (
        <AppProvider>
          <AppInner />
        </AppProvider>
      );
    }

    function AppInner() {
      const { activeTab } = useContext(AppContext);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
          <Header />
          <main className="max-w-lg mx-auto px-4 pt-4 pb-28">
            {activeTab === 'logger' && <MealLogger />}
            {activeTab === 'dashboard' && <Dashboard />}
            {activeTab === 'ai' && <AIAnalysis />}
            {activeTab === 'goals' && <GoalSetting />}
            {activeTab === 'weekly' && <WeeklyReport />}
          </main>
          <Navigation />
        </div>
      );
    }

    /* ============================================================
       MOUNT
    ============================================================ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
